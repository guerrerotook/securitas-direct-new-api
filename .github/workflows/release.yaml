name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 5.1.0 — no leading v)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Bump manifests, tag, and release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      PRERELEASE: ${{ inputs.prerelease }}
      BRANCH: ${{ github.ref_name }}
      REF_TYPE: ${{ github.ref_type }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate dispatch ref
        run: |
          if [ "$REF_TYPE" != "branch" ]; then
            echo "Workflow must be dispatched from a branch (got $REF_TYPE '$BRANCH'). The bump commit needs a branch to land on." >&2
            exit 1
          fi

      - name: Validate version input
        run: |
          if ! [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version '$VERSION' must be X.Y.Z or X.Y.Z-suffix with no leading zeros (build metadata not supported)." >&2
            exit 1
          fi
          if git show-ref --tags --verify --quiet "refs/tags/v$VERSION"; then
            echo "Tag v$VERSION already exists." >&2
            exit 1
          fi

      - name: Build release notes from changelog
        # The release notes are the curated, user-facing CHANGES.md section for
        # this version (a pre-release suffix resolves to the base ## vX.Y.Z
        # heading). Run it here — before any commit/tag/push — so a release with
        # no changelog entry fails early instead of leaving a dangling tag.
        run: |
          python3 scripts/extract_changelog.py "$VERSION" > release-notes.md
          echo "----- release notes -----"
          cat release-notes.md

      - name: Bump manifest versions
        run: |
          python3 <<'PY'
          import os, re, sys
          new_version = os.environ["VERSION"]
          path = "custom_components/securitas/manifest.json"
          with open(path) as f:
              content = f.read()
          updated, n = re.subn(
              r'("version"\s*:\s*)"[^"]+"',
              lambda m: m.group(1) + f'"{new_version}"',
              content,
          )
          if n != 1:
              sys.exit(f"Expected exactly one version field in {path}, found {n}")
          with open(path, "w") as f:
              f.write(updated)
          PY
          # Re-stamp the card modules' ?v= cache-bust queries to the new
          # version so the hard-cached (cache_headers=True) bundles bust on
          # release. Kept in sync with manifest.json by
          # tests-js/integration/card-cache-busting.test.js and
          # tests/test_card_cache_busting.py::test_card_import_versions_match_manifest.
          # The pattern only matches relative "./x.js?v=..." import specifiers
          # (not absolute/CDN URLs).
          sed -i -E 's#("\./[A-Za-z0-9._-]+\.js)\?v=[^"]*"#\1?v='"$VERSION"'"#g' \
            custom_components/securitas/www/*.js
          git diff --stat
          git diff

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit, tag, push
        run: |
          git add custom_components/securitas/manifest.json custom_components/securitas/www
          if git diff --cached --quiet; then
            # Manifest already at the requested version — happens when a
            # branch has been hand-bumped pre-release (e.g. a long-lived
            # PR landed with the manifest already updated).  Tag the
            # current HEAD; no chore-bump commit needed.
            echo "Manifest already at $VERSION — tagging current HEAD without a release commit."
          else
            git commit -m "chore: release $VERSION"
            git push origin "HEAD:$BRANCH"
          fi
          git tag -a "v$VERSION" -m "Release $VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=""
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release-notes.md \
            $prerelease_flag

      - name: Roll branch forward to the next minor (final releases only)
        # Skip for pre-releases: only a finished release rolls the version
        # forward, so unreleased work no longer carries the just-released
        # version. Pushes directly to the dispatched branch, the same way the
        # "Commit, tag, push" step above already does.
        if: ${{ inputs.prerelease != true }}
        run: |
          NEXT=$(python3 -c "import os; mj, mn, _ = os.environ['VERSION'].split('-')[0].split('.'); print(f'{mj}.{int(mn)+1}.0')")
          echo "Final release — rolling $BRANCH forward to development version $NEXT"
          NEXT="$NEXT" python3 <<'PY'
          import os, re, sys
          new_version = os.environ["NEXT"]
          path = "custom_components/securitas/manifest.json"
          with open(path) as f:
              content = f.read()
          updated, n = re.subn(
              r'("version"\s*:\s*)"[^"]+"',
              lambda m: m.group(1) + f'"{new_version}"',
              content,
          )
          if n != 1:
              sys.exit(f"Expected exactly one version field in {path}, found {n}")
          with open(path, "w") as f:
              f.write(updated)
          PY
          # Keep the card ?v= cache-bust in sync with the rolled-forward version.
          sed -i -E 's#("\./[A-Za-z0-9._-]+\.js)\?v=[^"]*"#\1?v='"$NEXT"'"#g' \
            custom_components/securitas/www/*.js
          git add custom_components/securitas/manifest.json custom_components/securitas/www
          git commit -m "chore: bump version to $NEXT for development"
          git push origin "HEAD:$BRANCH"
