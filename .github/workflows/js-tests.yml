name: JS Tests

on:
  pull_request:
    paths:
      - "custom_components/securitas/www/**"
      - "tests-js/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.js"
      - "eslint.config.js"
      - ".prettierrc.json"
      - ".github/workflows/js-tests.yml"
  push:
    branches: [main]
    paths:
      - "custom_components/securitas/www/**"
      - "tests-js/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.js"
      - "eslint.config.js"
      - ".prettierrc.json"
      - ".github/workflows/js-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
