name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

  typecheck:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_test.txt pyright

      - name: Pyright
        run: pyright custom_components/

  test:
    name: Tests (${{ matrix.ha-channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ha-channel: [dev, stable, minimum]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve stable HA version
        if: matrix.ha-channel == 'stable'
        run: |
          HA_VERSION=$(curl -fsSL "https://pypi.org/pypi/homeassistant/json" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "Stable HA version: $HA_VERSION"
          echo "HA_VERSION=$HA_VERSION" >> "$GITHUB_ENV"

      - name: Install dependencies (stable)
        if: matrix.ha-channel == 'stable'
        run: |
          pip install --upgrade pip
          # Pin HA to the stable release via a constraint so phcc can't upgrade it
          echo "homeassistant==$HA_VERSION" > /tmp/ha_stable.txt
          pip install -r requirements_test.txt --constraint /tmp/ha_stable.txt

      - name: Install dependencies (minimum)
        if: matrix.ha-channel == 'minimum'
        run: |
          pip install --upgrade pip
          # phcc 0.13.210 pins homeassistant==2025.2.0 (our declared minimum)
          # Install phcc first — it pins exact versions of pytest, pytest-asyncio,
          # coverage etc. that conflict with the ~= ranges in requirements_test.txt
          pip install pytest-homeassistant-custom-component==0.13.210 pytest-cov PyJWT~=2.10

      - name: Install dependencies (dev)
        if: matrix.ha-channel == 'dev'
        run: |
          pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=custom_components/securitas \
            --cov-report=term-missing \
            --cov-fail-under=90
